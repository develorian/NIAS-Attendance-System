<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIAS - Control de Asistencia Naval</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="max-w-screen min-h-screen flex flex-col">
        
        <header class="p-md text-center bg-surface shadow-sm rounded-b-lg">
            <p class="text-sm text-muted uppercase tracking-widest">Bienvenido al NIAS</p>
            <h1 class="text-lg text-primary">Naval Identity & Attendance System</h1>
            
            <div class="mt-md">
                <div id="clock-time" class="text-2xl font-mono">--:-- HRS</div>
                <div id="clock-date" class="text-sm text-muted uppercase mt-xs">-- --- ----</div>
            </div>
        </header>

        <section class="p-md flex flex-col gap-sm">
            <h2 class="text-md text-center text-muted uppercase">Identificador Biométrico</h2>
            
            <div class="camera-wrapper rounded-lg shadow-md overflow-hidden border">
                <video id="webcam" autoplay playsinline></video>
                <div class="camera-overlay">
                    <div class="camera-guide"></div>
                </div>
                <p class="absolute top-sm w-full text-center text-sm" style="position:absolute; top:1rem; color:rgba(255,255,255,0.8); text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
                    Acerca tu rostro
                </p>
            </div>
            
            <p id="location-display" class="text-xs text-center text-muted">
                📍 Detectando ubicación...
            </p>
            <canvas id="canvas" style="display: none;"></canvas>
        </section>

        <section class="p-md bg-surface shadow-sm rounded-t-lg mt-auto">
            <h2 class="text-md text-muted uppercase mb-md text-center border-b pb-sm" style="border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-xs);">Panel de Guardia</h2>
            
            <div class="flex flex-col gap-md">
                <div class="toggle-group">
                    <button id="btn-entrada" class="btn toggle-btn" data-type="entrada" data-state="active">Entrada ⬇</button>
                    <button id="btn-salida" class="btn toggle-btn" data-type="salida" data-state="inactive">Salida ⬆</button>
                </div>

                <div>
                    <label class="text-xs text-muted block mb-xs" style="margin-bottom: 4px;">Motivo:</label>
                    <input type="text" id="reason" class="input-field" value="Ingreso a labores">
                </div>

                <button id="btn-registrar" class="btn btn-success w-full text-lg py-md">
                    📷 Registrar Movimiento
                </button>
            </div>
        </section>

        <section class="p-md mt-lg border-t" style="border-top: 1px dashed var(--color-border);">
            <h2 class="text-md text-muted uppercase mb-md text-center">Alta de Elemento (Admin)</h2>
            
            <div class="flex flex-col gap-sm">
                <input type="text" id="reg_id" class="input-field" placeholder="Matrícula (Ej. 123456)">
                <input type="text" id="reg_grade" class="input-field" placeholder="Grado (Ej. Teniente de Navío)">
                <input type="text" id="reg_name" class="input-field" placeholder="Nombre Completo">
                <input type="text" id="reg_assign" class="input-field" placeholder="Adscripción">
                <input type="text" id="reg_role" class="input-field" placeholder="Cargo">
                
                <button id="btn-alta" class="btn btn-outline w-full mt-sm">
                    👤 Dar de Alta
                </button>
            </div>
        </section>

    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
