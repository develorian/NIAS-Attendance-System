<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIAS - Control de Asistencia Naval</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .video-container { text-align: center; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: auto; transform: scaleX(-1); } /* Efecto espejo */
        canvas { display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4a5568; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #2b6cb0; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #2c5282; }
        button.success { background-color: #38a169; }
        button.success:hover { background-color: #2f855a; }
        .alert { padding: 15px; margin-top: 20px; border-radius: 5px; display: none; font-weight: bold; }
        .alert.success { background-color: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; display: block; }
        .alert.error { background-color: #fed7d7; color: #742a2a; border: 1px solid #feb2b2; display: block; }
        #location-display { font-size: 0.9em; color: #718096; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Naval Identity & Attendance System (NIAS)</h1>
    
    <div class="grid">
        <div>
            <h2>Cámara del Sistema</h2>
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
            </div>
            <p id="location-display">📍 Obteniendo ubicación GPS...</p>
            <canvas id="canvas"></canvas>
            <div id="alert-box" class="alert"></div>
        </div>

        <div>
            <h2>Panel de Guardia (Pase de Lista)</h2>
            <div class="form-group">
                <label>Movimiento:</label>
                <select id="is_entry">
                    <option value="true">Entrada a la Unidad</option>
                    <option value="false">Salida de la Unidad</option>
                </select>
            </div>
            <div class="form-group">
                <label>Motivo:</label>
                <input type="text" id="reason" value="Ingreso a labores">
            </div>
            <button class="success" onclick="registrarAsistencia()">📷 Registrar Movimiento</button>

            <hr style="margin: 30px 0; border: 1px solid #e2e8f0;">

            <h2>Panel de Administrador (Alta de Elemento)</h2>
            <div class="form-group"><input type="text" id="reg_id" placeholder="Matrícula (Ej. 123456)"></div>
            <div class="form-group"><input type="text" id="reg_grade" placeholder="Grado (Ej. Teniente de Navío)"></div>
            <div class="form-group"><input type="text" id="reg_name" placeholder="Nombre Completo"></div>
            <div class="form-group"><input type="text" id="reg_assign" placeholder="Adscripción"></div>
            <div class="form-group"><input type="text" id="reg_role" placeholder="Cargo"></div>
            <button onclick="registrarElemento()">👤 Dar de Alta en el Sistema</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://asistencia.develorian.dev/api/v1";
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const alertBox = document.getElementById('alert-box');
    let currentLocation = "Ubicación desconocida";

    // 1. Iniciar la cámara web
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { mostrarAlerta("Error al acceder a la cámara. Revisa los permisos.", false); });

    // 2. Obtener Geolocalización y convertirla a texto (Municipio, Estado)
    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        try {
            // Usamos la API gratuita de OpenStreetMap para Reverse Geocoding
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
            const data = await response.json();
            const city = data.address.city || data.address.town || data.address.village || "Municipio desconocido";
            const state = data.address.state || "Estado desconocido";
            currentLocation = `${city}, ${state}`;
            document.getElementById('location-display').innerText = `📍 Ubicación detectada: ${currentLocation}`;
        } catch (error) {
            document.getElementById('location-display').innerText = "📍 No se pudo obtener el nombre de la ubicación.";
        }
    }, () => {
        document.getElementById('location-display').innerText = "📍 Permiso de GPS denegado.";
    });

    // Función auxiliar para mostrar alertas en pantalla
    function mostrarAlerta(mensaje, esExito) {
        alertBox.className = "alert " + (esExito ? "success" : "error");
        alertBox.innerText = mensaje;
        setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
    }

    // Función auxiliar para capturar la foto actual de la cámara en base64
    function capturarFrame() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg');
    }

    // 3. Lógica para que el Oficial de Guardia pase lista
    async function registrarAsistencia() {
        const base64Image = capturarFrame();
        const isEntry = document.getElementById('is_entry').value === 'true';
        const reason = document.getElementById('reason').value;

        mostrarAlerta("Procesando biometría facial...", true);

        try {
            const response = await fetch(`${API_URL}/attendance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    image_b64: base64Image, 
                    is_entry: isEntry, 
                    reason: reason, 
                    location: currentLocation 
                })
            });

            const data = await response.json();
            if (response.ok) {
                mostrarAlerta(`✅ [${data.movimiento}] Autorizado para la matrícula: ${data.user_id}. ${data.ubicacion_oficial}`, true);
            } else {
                mostrarAlerta(`❌ Acceso Denegado: ${data.message}`, false);
            }
        } catch (error) {
            mostrarAlerta("Error de conexión con el servidor NIAS.", false);
        }
    }

    // 4. Lógica para el panel de Administrador (Alta)
    async function registrarElemento() {
        const base64Image = capturarFrame();
        const id = document.getElementById('reg_id').value;
        const grade = document.getElementById('reg_grade').value;
        const name = document.getElementById('reg_name').value;
        
        if (!id || !name) {
            mostrarAlerta("❌ Matrícula y Nombre son obligatorios para el alta.", false);
            return;
        }

        mostrarAlerta("Registrando biometría en la base de datos...", true);

        try {
            const response = await fetch(`${API_URL}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image_b64: base64Image,
                    id: id,
                    grade: grade,
                    name: name,
                    assignment: document.getElementById('reg_assign').value,
                    role: document.getElementById('reg_role').value
                })
            });

            const data = await response.json();
            if (response.ok) {
                mostrarAlerta(`✅ Elemento ${name} registrado con éxito.`, true);
            } else {
                mostrarAlerta(`❌ Error al registrar: ${data.message}`, false);
            }
        } catch (error) {
            mostrarAlerta("Error de conexión con el servidor.", false);
        }
    }
</script>

</body>
</html>
